name: Build and push openclaw image

on:
  push:
    branches:
      - main
    paths:
      - images/openclaw/**

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/openclaw
          push: true
          tags: |
            ghcr.io/carlosgit2016/openclaw:latest
            ghcr.io/carlosgit2016/openclaw:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
