apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: main
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/carlosgit2016/homelab.git
      targetRevision: HEAD
      path: charts/openclaw
      helm:
        valueFiles:
          - $values/manifests/openclaw/main/values.yaml
    - repoURL: https://github.com/carlosgit2016/homelab.git
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/carlosgit2016/homelab.git
      targetRevision: HEAD
      path: manifests/openclaw/main
      directory:
        include: '{configmap.yaml,sealed-secret.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: openclaw
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
