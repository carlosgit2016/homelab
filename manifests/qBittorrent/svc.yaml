apiVersion: v1
kind: Service
metadata:
  labels:
    app: qbittorrent
  name: qbittorrent
spec:
  ports:
  - name: "ui"
    port: 80
    protocol: TCP
    targetPort: 8096
    nodePort: 30321
  - name: "torrent"
    port: 6881
    protocol: TCP
    targetPort: 6881
  - name: "upnp"
    port: 1900
    nodePort: 31900
    targetPort: 1900
    protocol: UDP
  selector:
    app: qbittorrent
  type: NodePort
status:
  loadBalancer: {}
