apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      serviceAccountName: openclaw
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
        fsGroup: 1000
      initContainers:
        - name: init-argocd
          image: ghcr.io/carlosgit2016/openclaw:latest
          imagePullPolicy: Always
          env:
            - name: HOME
              value: /home/linuxbrew
          command:
            - sh
            - -c
            - |
              export PATH="/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:$PATH"
              ARGOCD_PASS=$(kubectl get secret argocd-initial-admin-secret -n argocd \
                -o jsonpath='{.data.password}' | base64 -d)
              argocd login argocd-server.argocd.svc.cflor.org \
                --username admin --password "$ARGOCD_PASS" \
                --insecure --grpc-web
          volumeMounts:
            - name: argocd-config
              mountPath: /home/linuxbrew/.config/argocd
        - name: init-config
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              mkdir -p /openclaw-home/workspace /openclaw-home/cron
              cp /config/openclaw.json  /openclaw-home/openclaw.json
              cp /config/AGENTS.md     /openclaw-home/workspace/AGENTS.md
              cp /config/SOUL.md       /openclaw-home/workspace/SOUL.md
              cp /config/TOOLS.md      /openclaw-home/workspace/TOOLS.md
              cp /config/IDENTITY.md   /openclaw-home/workspace/IDENTITY.md
              cp /config/USER.md       /openclaw-home/workspace/USER.md
              cp /config/cron-jobs.json /openclaw-home/cron/jobs.json
          volumeMounts:
            - name: openclaw-home
              mountPath: /openclaw-home
            - name: openclaw-config
              mountPath: /config
              readOnly: true
      containers:
        - name: openclaw
          image: ghcr.io/carlosgit2016/openclaw:latest
          imagePullPolicy: Always
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: GEMINI_API_KEY
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: TELEGRAM_CHAT_ID
            - name: ARGOCD_SERVER
              value: argocd-server.argocd.svc.cflor.org
            - name: GIT_SSH_COMMAND
              value: "ssh -i /home/linuxbrew/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/etc/ssh/ssh_known_hosts"
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - openclaw health --json | jq -e '.ok == true'
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - openclaw health --json | jq -e '.ok == true'
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/linuxbrew/.openclaw
            - name: workspace
              mountPath: /workspace
            - name: ssh-key
              mountPath: /home/linuxbrew/.ssh
            - name: argocd-config
              mountPath: /home/linuxbrew/.config/argocd
      volumes:
        - name: openclaw-home
          emptyDir: {}
        - name: openclaw-config
          configMap:
            name: openclaw-config
        - name: workspace
          persistentVolumeClaim:
            claimName: openclaw-workspace
        - name: ssh-key
          secret:
            secretName: openclaw-ssh-key
            defaultMode: 0600
            items:
              - key: id_rsa
                path: id_rsa
        - name: argocd-config
          emptyDir: {}
