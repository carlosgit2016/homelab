apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      serviceAccountName: openclaw
      securityContext:
        runAsUser: 1000
        runAsNonRoot: true
      containers:
        - name: openclaw
          image: ghcr.io/carlosgit2016/openclaw:latest
          imagePullPolicy: Always
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: GEMINI_API_KEY
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: TELEGRAM_CHAT_ID
          volumeMounts:
            - name: openclaw-config
              mountPath: /home/openclaw/.openclaw
            - name: workspace
              mountPath: /workspace
            - name: ssh-key
              mountPath: /home/openclaw/.ssh
      volumes:
        - name: openclaw-config
          configMap:
            name: openclaw-config
        - name: workspace
          persistentVolumeClaim:
            claimName: openclaw-workspace
        - name: ssh-key
          secret:
            secretName: openclaw-ssh-key
            defaultMode: 0600
            items:
              - key: id_rsa
                path: id_rsa
