# Debian Preseed Configuration for Packer
# Locale and Keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# Network Configuration (Static IP for Packer)
d-i netcfg/choose_interface select auto
d-i netcfg/disable_autoconfig boolean true
d-i netcfg/get_ipaddress string 192.168.15.250
d-i netcfg/get_netmask string 255.255.255.0
d-i netcfg/get_gateway string 192.168.15.1
d-i netcfg/get_nameservers string 8.8.8.8
d-i netcfg/confirm_static boolean true
d-i netcfg/get_hostname string debian
d-i netcfg/get_domain string localdomain
d-i netcfg/wireless_wep string

# Mirror Configuration
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# User Configuration
d-i passwd/user-fullname string Debian User
d-i passwd/username string cflor
d-i passwd/user-password password debian
d-i passwd/user-password-again password debian
d-i passwd/root-login boolean false
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

# Clock and Timezone
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

# Partitioning
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Package Selection
tasksel tasksel/first multiselect standard
d-i pkgsel/include string openssh-server sudo
d-i pkgsel/upgrade select none
popularity-contest popularity-contest/participate boolean false

# Boot Loader
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

# Finish Installation
d-i finish-install/reboot_in_progress note
d-i debian-installer/exit/poweroff boolean false

# Sudoers, network configuration, and apt sources
d-i preseed/late_command string \
    echo 'cflor ALL=(ALL) NOPASSWD: ALL' > /target/etc/sudoers.d/cflor; \
    chmod 440 /target/etc/sudoers.d/cflor; \
    echo 'auto ens18' > /target/etc/network/interfaces.d/ens18; \
    echo 'iface ens18 inet static' >> /target/etc/network/interfaces.d/ens18; \
    echo '  address 192.168.15.250/24' >> /target/etc/network/interfaces.d/ens18; \
    echo '  gateway 192.168.15.1' >> /target/etc/network/interfaces.d/ens18; \
    echo '  dns-nameservers 8.8.8.8' >> /target/etc/network/interfaces.d/ens18; \
    in-target sed -i '/^allow-hotplug ens18/d; /^iface ens18/d; /^# This is an autoconfigured IPv6/d' /etc/network/interfaces; \
    sed -i '/cdrom/d' /target/etc/apt/sources.list; \
    echo 'deb http://deb.debian.org/debian trixie main' >> /target/etc/apt/sources.list; \
    echo 'deb http://security.debian.org/debian-security trixie-security main' >> /target/etc/apt/sources.list; \
    echo 'deb http://deb.debian.org/debian trixie-updates main' >> /target/etc/apt/sources.list
