- name: Control plane configuration
  hosts: controlplane
  become: true
  environment:
    CONTAINERD_VERSION: "2.2.1"
    RUNC_VERSION: "1.4.0"
    CNI_PLUGIN_VERSION: "1.9.0"
  vars:
    crictl_version: "1.35.0"
    kubernetes_version: "1.35"
  roles:
    - common
    - sourcesupdate
    - containerd
    - crictl
    - k8stools
    - controlplane
  tasks:
    - name: Tools configuration
      ansible.builtin.include_tasks: roles/controlplane/tasks/tools.yaml

- name: Configuring CNI
  hosts: controlplane
  become: true
  gather_facts: false
  vars:
    calico_version: "3.31.3"
  tasks:
    - name: Cni installation
      ansible.builtin.include_tasks: roles/controlplane/tasks/cni.yaml

- name: Removing controlplane taints
  hosts: controlplane
  become: true
  gather_facts: true
  tasks:
    - name: Removing controlplane taints
      kubernetes.core.k8s_taint:
        state: absent
        name: "{{ ansible_hostname }}"
        taints:
          - effect: NoSchedule
            key: "node-role.kubernetes.io/control-plane"
        kubeconfig: "{{ kubeconfig }}"
        context: "{{ context }}"
      changed_when: false
