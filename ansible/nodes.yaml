- name: Node configuration
  hosts: nodes
  become: true
  environment:
    CONTAINERD_VERSION: "2.2.1"
    RUNC_VERSION: "1.4.0"
    CNI_PLUGIN_VERSION: "1.9.0"
  vars:
    crictl_version: "1.35.0"
    kubernetes_version: "1.35"
  roles:
    - common
    - sourcesupdate
    - containerd
    - crictl
    - k8stools

- name: Join cluster
  hosts: all
  gather_facts: true
  become: true
  roles:
    - joincluster
