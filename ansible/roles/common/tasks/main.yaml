- name: Upgrade all packages
  ansible.builtin.apt:
    name: "*"
    state: latest
    update_cache: true

- name: Common packages install
  ansible.builtin.apt:
    pkg:
      - vim
      - net-tools
      - netcat-traditional
      - apt-transport-https
      - ca-certificates
      - curl
      - gpg
      - telnet
      - python3-yaml
      - python3-kubernetes
      - jq
      - open-iscsi
      - git
    state: latest

- name: Configure public key to root
  ansible.builtin.copy:
    src: files/authorized_keys
    dest: /root/.ssh/authorized_keys
    mode: "640"

- name: Configure public key to cflor
  ansible.builtin.copy:
    src: files/authorized_keys
    dest: /home/cflor/.ssh/authorized_keys
    mode: "640"

- name: Checking swap status
  ansible.builtin.command: swapon --show
  register: swapon_output
  changed_when: false

# ==============================================================================
# Raspberry Pi Bare-Metal Support
# The following tasks handle Raspberry Pi-specific configurations (dphys-swapfile,
# boot firmware cmdline). These are skipped on non-Raspberry Pi systems via
# conditional checks. Required for alternative bare-metal deployments on RPi hardware.
# ==============================================================================

- name: Check if dphys-swapfile exists (Raspberry Pi)
  ansible.builtin.command: which dphys-swapfile
  register: dphys_swapfile_check
  failed_when: false
  changed_when: false

- name: Disable swap (Raspberry Pi with dphys-swapfile)
  ansible.builtin.shell: |
    dphys-swapfile swapoff
    dphys-swapfile uninstall
    systemctl stop dphys-swapfile.service
    systemctl disable dphys-swapfile.service
    systemctl mask dphys-swapfile.service
  args:
    executable: /bin/bash
  changed_when: swapon_output.stdout != ""
  when: swapon_output.stdout != "" and dphys_swapfile_check.rc == 0

- name: Disable swap (Standard Debian/Ubuntu)
  ansible.builtin.shell: |
    swapoff -a
    sed -i '/swap/d' /etc/fstab
  args:
    executable: /bin/bash
  changed_when: swapon_output.stdout != ""
  when: swapon_output.stdout != "" and dphys_swapfile_check.rc != 0

- name: Check if boot firmware cmdline exists (Raspberry Pi)
  ansible.builtin.stat:
    path: /boot/firmware/cmdline.txt
  register: boot_cmdline_stat

- name: Checking if cgroup is enabled in boot
  ansible.builtin.shell: |
    for cf in "cgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory"; do
      grep --silent -e "$cf" /boot/firmware/cmdline.txt
    done
  args:
    executable: /bin/bash
  register: cgroup_enabled
  failed_when: cgroup_enabled.rc == 2
  changed_when: cgroup_enabled.rc == 1
  when: boot_cmdline_stat.stat.exists

- name: Enabling cgroup in boot
  ansible.builtin.shell: |
    set -eo pipefail
    sed -i 's|$| cgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory|' /boot/firmware/cmdline.txt
  args:
    executable: /bin/bash
  when: boot_cmdline_stat.stat.exists and cgroup_enabled.rc == 1
  changed_when: cgroup_enabled.rc == 1

- name: Enable IP forward
  ansible.builtin.shell: |
    set -eo pipefail
    cp /proc/sys/net/ipv4/ip_forward /tmp/
    sed -i "s|0|1|" /tmp/ip_forward
    cat /tmp/ip_forward > /proc/sys/net/ipv4/ip_forward
  args:
    executable: /bin/bash
  changed_when: false

- name: Copy /etc/hosts
  register: copy_additional_hosts
  ansible.builtin.copy:
    src: files/additional_hosts
    dest: /tmp/additional_hosts
    mode: '440'

- name: Updating /etc/hosts
  ansible.builtin.shell: |
    cat /tmp/additional_hosts >> /etc/hosts
  args:
    executable: /bin/bash
  changed_when: copy_additional_hosts.changed
  when: copy_additional_hosts.changed
