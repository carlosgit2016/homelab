apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw.fullname" . }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ include "openclaw.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "openclaw.fullname" . }}
    spec:
      serviceAccountName: {{ include "openclaw.fullname" . }}
      tolerations: {{ toYaml .Values.tolerations | nindent 8 }}
      securityContext: {{ toYaml .Values.securityContext | nindent 8 }}
      initContainers:
        {{- if .Values.initContainers.argocd.enabled }}
        - name: init-argocd
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
            requests:
              cpu: {{ .Values.resources.initArgocd.requests.cpu }}
              memory: {{ .Values.resources.initArgocd.requests.memory }}
          env:
            - name: HOME
              value: /home/linuxbrew
          command:
            - sh
            - -c
            - |
              export PATH="/home/linuxbrew/.linuxbrew/bin:/home/linuxbrew/.linuxbrew/sbin:$PATH"
              ARGOCD_PASS=$(kubectl get secret argocd-initial-admin-secret -n argocd \
                -o jsonpath='{.data.password}' | base64 -d)
              argocd login {{ .Values.initContainers.argocd.server }} \
                --username admin --password "$ARGOCD_PASS" \
                --insecure --grpc-web
          volumeMounts:
            - name: argocd-config
              mountPath: /home/linuxbrew/.config/argocd
        {{- end }}
        - name: init-config
          image: busybox:latest
          resources:
            requests:
              cpu: {{ .Values.resources.initConfig.requests.cpu }}
              memory: {{ .Values.resources.initConfig.requests.memory }}
          command:
            - sh
            - -c
            - |
              mkdir -p /openclaw-home/workspace /openclaw-home/cron /openclaw-home/git
              cp /config/openclaw.json  /openclaw-home/openclaw.json
              cp /config/AGENTS.md     /openclaw-home/workspace/AGENTS.md
              cp /config/SOUL.md       /openclaw-home/workspace/SOUL.md
              cp /config/TOOLS.md      /openclaw-home/workspace/TOOLS.md
              cp /config/IDENTITY.md   /openclaw-home/workspace/IDENTITY.md
              cp /config/USER.md       /openclaw-home/workspace/USER.md
          volumeMounts:
            - name: workspace
              mountPath: /openclaw-home
            - name: openclaw-config
              mountPath: /config
              readOnly: true
      containers:
        - name: openclaw
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
            requests:
              cpu: {{ .Values.resources.main.requests.cpu }}
              memory: {{ .Values.resources.main.requests.memory }}
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.secretName" . }}
                  key: GEMINI_API_KEY
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.secretName" . }}
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "openclaw.secretName" . }}
                  key: TELEGRAM_CHAT_ID
            - name: NODE_OPTIONS
              value: {{ .Values.nodeOptions | quote }}
            {{- if .Values.initContainers.argocd.enabled }}
            - name: ARGOCD_SERVER
              value: {{ .Values.initContainers.argocd.server }}
            {{- end }}
            {{- if .Values.git.sshEnabled }}
            - name: GIT_SSH_COMMAND
              value: "ssh -i /home/linuxbrew/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/etc/ssh/ssh_known_hosts"
            {{- end }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - openclaw health --json | jq -e '.ok == true'
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - openclaw health --json | jq -e '.ok == true'
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: workspace
              mountPath: /home/linuxbrew/.openclaw
            - name: ssh-key
              mountPath: /home/linuxbrew/.ssh
            {{- if .Values.initContainers.argocd.enabled }}
            - name: argocd-config
              mountPath: /home/linuxbrew/.config/argocd
            {{- end }}
      volumes:
        - name: openclaw-config
          configMap:
            name: {{ include "openclaw.configMapName" . }}
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "openclaw.fullname" . }}-workspace
        - name: ssh-key
          secret:
            secretName: {{ include "openclaw.sshKeySecretName" . }}
            defaultMode: 0600
            items:
              - key: id_rsa
                path: id_rsa
        {{- if .Values.initContainers.argocd.enabled }}
        - name: argocd-config
          emptyDir: {}
        {{- end }}
